# YardBird configuration
# Edit this file and restart the container to apply changes.

debug: false  # Enable debug logging in the browser console

plugins:
  jmri:
    host: raspi-jmri.local
    port: 12080
    secure: false
    mock: false  # Set to true to use simulated data (no JMRI hardware required)
    # tramPrefix: D    # System connection prefix for tram throttles (e.g. 'D' for DCC++).
                       # Run getSystemConnections() to discover available prefixes.
                       # Omit for single-connection layouts.
    # tramPwmFreq: 3   # DC PWM frequency applied on acquire via F29/F30/F31:
                       # 0=131Hz (default), 1=490Hz (F29), 2=3.4kHz (F30), 3=Supersonic (F31)

  # Uncomment and configure to enable Home Assistant scene control
  homeassistant:
    enabled: true
    url: http://homeassistant.local:8123
    token: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJiN2Y3YzJlMjk1ZGI0YjMxYjRjMGNmMjg0M2QyYTI5NyIsImlhdCI6MTc3NjYzODY4NCwiZXhwIjoyMDkxOTk4Njg0fQ.oohHNE_qv4m_jIyUQc44XGtruNWGAxNA_cZD5d6-1PM'  # from HA Profile → Long-Lived Access Tokens
    area: train_room  # HA area_id to filter entities

tabs:
  - id: throttles
    name: Locomotives
    icon: i-mdi-train

  - id: turnouts
    name: Turnouts
    icon: i-mdi-source-branch

  - id: lights
    name: Lights
    icon: i-mdi-lightbulb-outline

  # Uncomment to add the DCC-EX tram tab (requires dccex plugin)
  - id: trams
    name: Trams
    icon: i-mdi-tram

  # Uncomment to add the Home Assistant room tab (requires homeassistant plugin)
  - id: room
    name: Room
    icon: i-mdi-home
