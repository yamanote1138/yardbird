# YardBird configuration
# Edit this file and restart the container to apply changes.

debug: false  # Enable debug logging in the browser console

plugins:
  jmri:
    host: raspi-jmri.local
    port: 12080
    secure: false
    # Set to true to use simulated data (no JMRI hardware required)
    mock: false
    tramPrefix: D
    tramPwmFreq: 3
    # DC PWM frequency applied on acquire via F29/F30/F31:
    # 0=131Hz (default), 1=490Hz (F29), 2=3.4kHz (F30), 3=Supersonic (F31)

    # Power zone buttons shown in the header toolbar.
    # Option 1 — explicit zones (prefix "" = default JMRI connection):
    powerZones:
      - name: DCC
        prefix: "L"
      - name: Trams
        prefix: D
    # Option 2 — auto-discover from JMRI system connections:
    # powerZones:
    #   discover: true
    # Option 3 — single combined power button (omit powerZones entirely)

  # Uncomment and configure to enable Home Assistant scene control
  homeassistant:
    enabled: true
    url: http://homeassistant.local:8123
    token: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJiN2Y3YzJlMjk1ZGI0YjMxYjRjMGNmMjg0M2QyYTI5NyIsImlhdCI6MTc3NjYzODY4NCwiZXhwIjoyMDkxOTk4Njg0fQ.oohHNE_qv4m_jIyUQc44XGtruNWGAxNA_cZD5d6-1PM'  # from HA Profile → Long-Lived Access Tokens
    # HA area_id to filter entities
    area: train_room

tabs:
  - id: throttles
    name: Locomotives
    icon: i-mdi-train

  - id: turnouts
    name: Turnouts
    icon: i-mdi-source-branch

  - id: lights
    name: Lights
    icon: i-mdi-lightbulb-outline

  - id: trams
    name: Trams
    icon: i-mdi-tram

  - id: room
    name: Room
    icon: i-mdi-home
