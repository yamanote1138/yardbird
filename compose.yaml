services:
  yardbird:
    image: yamanote1138/yardbird:latest
    container_name: yardbird
    restart: always
    ports:
      - ${PORT:-8080}:80
      - ${DCCEX_WS_PORT:-2561}:2561
    environment:
      # DCC-EX proxy (controls the in-container TCP relay)
      - DCCEX_HOST=${DCCEX_HOST:-}
      - DCCEX_PORT=${DCCEX_PORT:-2560}
      - DCCEX_WS_PORT=${DCCEX_WS_PORT:-2561}
      # TOTI app configuration (injected into config.js at runtime)
      - YB_JMRI_HOST=${YB_JMRI_HOST:-}
      - YB_JMRI_PORT=${YB_JMRI_PORT:-}
      - YB_JMRI_SECURE=${YB_JMRI_SECURE:-}
      - YB_MOCK=${YB_MOCK:-}
      - YB_DEBUG=${YB_DEBUG:-}
      - YB_DCCEX_ENABLED=${YB_DCCEX_ENABLED:-}
      - YB_DCCEX_HOST=${YB_DCCEX_HOST:-}
      - YB_DCCEX_PORT=${YB_DCCEX_PORT:-}
      - YB_DCCEX_PWM_FREQ=${YB_DCCEX_PWM_FREQ:-}
      - YB_HA_ENABLED=${YB_HA_ENABLED:-}
      - YB_HA_URL=${YB_HA_URL:-}
      - YB_HA_TOKEN=${YB_HA_TOKEN:-}
      - YB_HA_AREA=${YB_HA_AREA:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
