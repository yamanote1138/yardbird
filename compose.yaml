services:
  yardbird:
    image: yamanote1138/yardbird:latest
    container_name: yardbird
    restart: always
    ports:
      - ${PORT:-8080}:80
    volumes:
      - ./config:/config
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
