# YardBird — Example Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Copy this file to:
#   Docker / production  →  config/yardbird.yaml  (volume-mounted at /config)
#   Development          →  public/yardbird.yaml
#
# This file provides factory defaults. Once you connect and build your
# dashboard through the visual editor, your layout is saved in the browser's
# localStorage. This file is only read again if you reset to defaults.
# ─────────────────────────────────────────────────────────────────────────────

# Enable verbose logging in the browser console (useful for troubleshooting)
debug: false

plugins:

  # ── JMRI ────────────────────────────────────────────────────────────────────
  # Required. YardBird connects directly to the JMRI JSON WebSocket server.
  # Enable it in JMRI: Preferences → Web Server → JSON WebSocket.
  jmri:
    host: jmri.local          # JMRI server hostname or IP
    port: 12080               # JSON WebSocket port (JMRI default: 12080)
    secure: false             # true → wss:// (for TLS / reverse-proxy setups)
    mock: false               # true → simulated data, no hardware needed

    # ── Tram / DC loop control ─────────────────────────────────────────────
    # YardBird controls DC tram loops natively through JMRI + DCC-EX.
    # Add your DCC-EX command station in JMRI Preferences → Connections first.
    #
    # tramPrefix: the system-connection prefix JMRI assigned to DCC-EX.
    # Omit entirely if your layout has only one system connection.
    # To find it: enable debug: true, connect, check the browser console —
    # or look in JMRI Preferences → Connections (letter shown next to DCC-EX).
    tramPrefix: D

    # DC PWM frequency applied when a tram throttle is acquired (via F29/F30/F31).
    #   0 = 131 Hz  (audible hum)
    #   1 = ~490 Hz
    #   2 = ~3.4 kHz
    #   3 = Supersonic  (recommended — silent DC operation)
    tramPwmFreq: 3

    # ── Command station power buttons ──────────────────────────────────────
    # Controls the power toggle buttons shown in the header toolbar.
    # Three modes — choose one:

    # Mode A — explicit stations (one button per entry):
    commandStations:
      - name: DCC             # Label shown on the button
        prefix: "L"           # System connection prefix (must match JMRI)
      - name: Trams
        prefix: D             # Should match tramPrefix above

    # Mode B — auto-discover stations from JMRI:
    # commandStations:
    #   discover: true

    # Mode C — single combined power button:
    # (remove or comment out the commandStations key entirely)

  # ── Home Assistant ───────────────────────────────────────────────────────
  # Optional. Enables HA entity widgets (lights, switches) filtered by area.
  # Get a Long-Lived Access Token from HA Profile → Security.
  homeassistant:
    enabled: true
    url: http://homeassistant.local:8123
    token: ''                 # Paste your Long-Lived Access Token here
    area: train_room          # HA area_id — only entities in this area appear

# ── Tabs ──────────────────────────────────────────────────────────────────────
# Dashboard tabs are created and arranged through the visual editor in the app.
# Leave this empty for a fresh start — you'll be guided into edit mode on first run.
# Export and import your full layout as a YAML file from within the editor.
tabs: []
